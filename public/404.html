<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AppealTheDenial</title>
    <script>
      // GitHub Pages SPA routing fix
      // Redirects /hello → /?/hello so index.html can handle it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        '?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
